<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>nana's green tea 四条室町店 クーポン</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      background: #1a3a1a;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .screen {
      background: #f4f7f2;
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── バナー ── */
    .cafe-banner {
      background: #1a3a1a;
      padding: 44px 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(120,200,80,0.2);
      animation: ripple 4s ease-out infinite;
      pointer-events: none;
    }
    .ripple:nth-child(1){ width:60px;  height:60px;  top:50%; left:50%; margin:-30px 0 0 -30px;  animation-delay:0s;   }
    .ripple:nth-child(2){ width:110px; height:110px; top:50%; left:50%; margin:-55px 0 0 -55px;  animation-delay:0.9s; }
    .ripple:nth-child(3){ width:170px; height:170px; top:50%; left:50%; margin:-85px 0 0 -85px;  animation-delay:1.8s; }
    @keyframes ripple {
      0%   { transform:scale(0.6); opacity:0.8; }
      100% { transform:scale(2.2); opacity:0; }
    }
    .particle {
      position: absolute;
      background: rgba(150,220,100,0.45);
      border-radius: 50%;
      animation: pfloat linear infinite;
      pointer-events: none;
    }
    @keyframes pfloat {
      0%   { transform:translateY(0) scale(1); opacity:0.5; }
      100% { transform:translateY(-60px) scale(0); opacity:0; }
    }
    .banner-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      z-index: 2;
    }
    .floating-matcha {
      font-size: 28px;
      animation: sway 3s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes sway {
      0%,100% { transform:translateY(0) rotate(-6deg); }
      50%      { transform:translateY(-6px) rotate(4deg); }
    }
    .banner-text { text-align: left; }
    .cafe-name-main {
      font-family: 'Noto Serif JP', serif;
      font-size: 18px;
      color: #d8f0c0;
      line-height: 1.3;
    }
    .cafe-branch {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      color: rgba(200,235,160,0.6);
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .cafe-tagline {
      display: inline-block;
      margin-top: 10px;
      background: rgba(80,160,50,0.3);
      border: 1px solid rgba(120,200,80,0.35);
      border-radius: 20px;
      padding: 4px 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 10px;
      color: rgba(190,240,140,0.8);
      letter-spacing: 1.5px;
      position: relative;
      z-index: 2;
    }

    /* ── クーポンエリア ── */
    .coupon-container {
      flex: 1;
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .coupon-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.09);
      position: relative;
      flex-shrink: 0;
    }

    /* 利用済みオーバーレイ */
    .used-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.52);
      z-index: 10;
      border-radius: 16px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .used-overlay.show { display: flex; }
    .used-stamp {
      border: 4px solid #e05050;
      border-radius: 10px;
      padding: 10px 28px;
      transform: rotate(-12deg);
      animation: stampIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes stampIn {
      from { transform:rotate(-12deg) scale(2); opacity:0; }
      to   { transform:rotate(-12deg) scale(1); opacity:1; }
    }
    .used-stamp-text {
      font-family: 'Noto Serif JP', serif;
      font-size: 40px;
      font-weight: 600;
      color: #e05050;
      letter-spacing: 4px;
    }
    .used-date {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
    }

    .coupon-top {
      background: linear-gradient(135deg, #2d6a2d 0%, #4aaa4a 100%);
      padding: 14px 16px 12px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .coupon-top::before {
      content:'';
      position:absolute; top:-50%; left:-70%;
      width:50%; height:200%;
      background:rgba(255,255,255,0.11);
      transform:skewX(-18deg);
      animation:shine 4s 2s infinite;
    }
    @keyframes shine {
      0%{ left:-70%; } 40%,100%{ left:130%; }
    }
    .staff-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #FFD700;
      color: #1a3a1a;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      padding: 4px 16px;
      border-radius: 4px;
      margin-bottom: 8px;
      animation: badgepulse 2.5s 2s ease-in-out infinite;
    }
    @keyframes badgepulse {
      0%,100%{ box-shadow:0 0 0 0 rgba(255,215,0,0.5); }
      50%    { box-shadow:0 0 0 8px rgba(255,215,0,0); }
    }
    .coupon-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 4px;
    }
    .discount-wrap {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 2px;
      position: relative;
    }
    .pulse-ring {
      position:absolute;
      width:100px; height:100px;
      border:1.5px solid rgba(255,255,255,0.2);
      border-radius:50%;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      animation:pring 2.5s 2s ease-out infinite;
    }
    @keyframes pring {
      0%  { transform:translate(-50%,-50%) scale(0.8); opacity:0.8; }
      100%{ transform:translate(-50%,-50%) scale(1.6); opacity:0; }
    }
    .discount-num {
      font-family: 'Noto Serif JP', serif;
      font-size: 56px;
      color: white;
      line-height: 1;
      font-weight: 600;
      animation: popIn 0.7s 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .discount-pct {
      font-family: 'Noto Serif JP', serif;
      font-size: 22px;
      color: rgba(255,255,255,0.9);
      animation: popIn 0.7s 1.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from{ transform:scale(0.3); opacity:0; }
      to  { transform:scale(1);   opacity:1; }
    }

    .coupon-divider {
      display:flex; align-items:center; margin:0 -1px;
    }
    .divider-line{ flex:1; border-top:1px dashed #b0d8a8; }
    .dc-l{ width:16px; height:16px; background:#f4f7f2; border-radius:50%; flex-shrink:0; margin-left:-8px; }
    .dc-r{ width:16px; height:16px; background:#f4f7f2; border-radius:50%; flex-shrink:0; margin-right:-8px; }

    .coupon-bottom { padding: 12px 16px 14px; }
    .coupon-condition {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      color: #2d5a2d;
      font-weight: 500;
      text-align: center;
      background: #edf6e8;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 10px;
      line-height: 1.8;
      animation: pbg 2.5s 2s ease-in-out infinite;
    }
    @keyframes pbg {
      0%,100%{ background:#edf6e8; }
      50%    { background:#d8f0d0; }
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 5px 0;
      border-bottom: 1px solid #eef5ec;
    }
    .detail-label { font-family:'Noto Sans JP',sans-serif; font-size:10px; color:#aaa; }
    .detail-value { font-family:'Noto Sans JP',sans-serif; font-size:12px; color:#333; font-weight:500; }

    /* ── ボタン ── */
    .use-button {
      background: linear-gradient(135deg, #1a3a1a, #3a7a3a);
      color: #d8f0c0;
      border: none;
      border-radius: 12px;
      width: 100%;
      padding: 15px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, background 0.3s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .use-button:active { transform:scale(0.97); }
    .use-button.used { background:linear-gradient(135deg,#555,#777); color:#ccc; cursor:default; }
    .use-button::after {
      content:'';
      position:absolute; top:-50%; left:-70%;
      width:40%; height:200%;
      background:rgba(255,255,255,0.14);
      transform:skewX(-20deg);
      animation:shimmer 3.5s 3s infinite;
    }
    .use-button.used::after{ display:none; }
    @keyframes shimmer {
      0%{ left:-70%; } 35%,100%{ left:130%; }
    }
    .used-notice {
      display:none;
      text-align:center;
      font-family:'Noto Sans JP',sans-serif;
      font-size:11px;
      color:#999;
      line-height:1.7;
      flex-shrink: 0;
    }
    .used-notice.show{ display:block; }
  </style>
</head>
<body>
  <div class="screen">

    <div class="cafe-banner" id="banner">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="banner-inner">
        <div class="floating-matcha">🍵</div>
        <div class="banner-text">
          <div class="cafe-name-main">nana's green tea</div>
          <div class="cafe-branch">四条室町店</div>
        </div>
      </div>
      <div class="cafe-tagline">京都経済センター勤務者 限定クーポン</div>
    </div>

    <div class="coupon-container">

      <div class="coupon-card">
        <div class="used-overlay" id="used-overlay">
          <div class="used-stamp">
            <div class="used-stamp-text">利 用 済</div>
          </div>
          <div class="used-date" id="used-date-text"></div>
        </div>

        <div class="coupon-top">
          <div class="pulse-ring"></div>
          <div class="staff-badge">★&nbsp;STAFF SPECIAL&nbsp;★</div>
          <div class="coupon-title">京都経済センター勤務者様限定</div>
          <div class="discount-wrap">
            <div class="discount-num" id="count-num">0</div>
            <div class="discount-pct">%OFF</div>
          </div>
        </div>

        <div class="coupon-divider">
          <div class="dc-l"></div>
          <div class="divider-line"></div>
          <div class="dc-r"></div>
        </div>

        <div class="coupon-bottom">
          <div class="coupon-condition">📱 会計時にこの画面を<br>スタッフへご提示ください</div>
          <div class="detail-grid">
            <div class="detail-item">
              <span class="detail-label">対象</span>
              <span class="detail-value">経済センター勤務者様</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">対象メニュー</span>
              <span class="detail-value">全メニュー</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">有効期限</span>
              <span class="detail-value" id="expiry-date"></span>
            </div>
            <div class="detail-item">
              <span class="detail-label">ご利用回数</span>
              <span class="detail-value">1日1回まで</span>
            </div>
          </div>
        </div>
      </div>

      <button class="use-button" id="use-btn" onclick="handleUse()">このクーポンを使う</button>
      <div class="used-notice" id="used-notice">本日分はすでにご利用済みです。<br>日付が変わると再びご利用いただけます。</div>

    </div>
  </div>

  <script>
    function todayStr(){
      var d=new Date();
      return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    }

    var today=new Date();
    var last=new Date(today.getFullYear(),today.getMonth()+1,0);
    document.getElementById('expiry-date').textContent=
      last.getFullYear()+'年'+(last.getMonth()+1)+'月'+last.getDate()+'日';

    function showUsed(){
      var saved=localStorage.getItem('ngt_used_date');
      document.getElementById('used-date-text').textContent=
        (saved||todayStr()).replace(/-/g,'/')+' ご利用済み';
      document.getElementById('used-overlay').classList.add('show');
      var btn=document.getElementById('use-btn');
      btn.classList.add('used');
      btn.textContent='本日は利用済みです';
      btn.disabled=true;
      document.getElementById('used-notice').classList.add('show');
    }

    function checkUsed(){
      var saved=localStorage.getItem('ngt_used_date');
      if(saved && saved===todayStr()) showUsed();
    }

    function handleUse(){
      var btn=document.getElementById('use-btn');
      if(btn.disabled) return;
      btn.style.background='linear-gradient(135deg,#1a5a1a,#3aaa3a)';
      btn.textContent='✓ ご提示ありがとうございます！';
      btn.style.color='white';
      btn.disabled=true;
      setTimeout(function(){
        localStorage.setItem('ngt_used_date',todayStr());
        showUsed();
      },2000);
    }

    setTimeout(function(){
      var n=0,el=document.getElementById('count-num');
      var t=setInterval(function(){ el.textContent=++n; if(n>=10)clearInterval(t); },80);
    },1200);

    var banner=document.getElementById('banner');
    function spawn(){
      var p=document.createElement('div');
      p.className='particle';
      p.style.left=Math.random()*100+'%';
      p.style.bottom='0';
      p.style.animationDuration=(2+Math.random()*2)+'s';
      var s=(2+Math.random()*3)+'px';
      p.style.width=s; p.style.height=s;
      p.style.opacity=0.3+Math.random()*0.4;
      banner.appendChild(p);
      setTimeout(function(){p.remove();},4000);
    }
    setInterval(spawn,700);

    checkUsed();
  </script>
</body>
</html>
