<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>nana's green tea 四条室町店 クーポン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8f0e4;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0;
    }

    .screen {
      background: #f4f7f2;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== LINE HEADER ===== */
    .line-header {
      background: #06C755;
      padding: 52px 18px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .back-arrow { color: white; font-size: 20px; }
    .line-header-title {
      color: white;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 500;
      flex: 1;
      text-align: center;
    }

    /* ===== BANNER ===== */
    .cafe-banner {
      background: #1a3a1a;
      padding: 32px 24px 26px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(120,200,80,0.25);
      animation: ripple 4s ease-out infinite;
      pointer-events: none;
    }
    .ripple:nth-child(1) { width: 80px;  height: 80px;  top:50%; left:50%; margin:-40px  0 0 -40px;  animation-delay:0s;   }
    .ripple:nth-child(2) { width: 140px; height: 140px; top:50%; left:50%; margin:-70px  0 0 -70px;  animation-delay:0.8s; }
    .ripple:nth-child(3) { width: 200px; height: 200px; top:50%; left:50%; margin:-100px 0 0 -100px; animation-delay:1.6s; }
    .ripple:nth-child(4) { width: 280px; height: 280px; top:50%; left:50%; margin:-140px 0 0 -140px; animation-delay:2.4s; }
    @keyframes ripple {
      0%   { transform: scale(0.6); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    .particle {
      position: absolute;
      background: rgba(150,220,100,0.5);
      border-radius: 50%;
      animation: particle-float linear infinite;
      pointer-events: none;
    }
    @keyframes particle-float {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.6; }
      50%  { opacity: 1; }
      100% { transform: translateY(-80px) translateX(20px) scale(0); opacity: 0; }
    }

    .floating-matcha {
      font-size: 40px;
      position: relative;
      z-index: 2;
      display: inline-block;
      animation: matcha-sway 3s ease-in-out infinite;
    }
    @keyframes matcha-sway {
      0%,100% { transform: translateY(0) rotate(-6deg) scale(1); }
      33%      { transform: translateY(-10px) rotate(4deg) scale(1.05); }
      66%      { transform: translateY(-4px) rotate(-2deg) scale(0.97); }
    }

    .cafe-name-main {
      font-family: 'Noto Serif JP', serif;
      font-size: 22px;
      color: #d8f0c0;
      margin: 12px 0 4px;
      position: relative; z-index: 2;
      animation: fadeSlideUp 1s 0.45s both;
    }
    .cafe-branch {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      color: rgba(200,235,160,0.65);
      letter-spacing: 1.5px;
      position: relative; z-index: 2;
      animation: fadeSlideUp 1s 0.55s both;
    }
    .cafe-tagline {
      display: inline-block;
      margin-top: 12px;
      background: rgba(80,160,50,0.3);
      border: 1px solid rgba(120,200,80,0.4);
      border-radius: 20px;
      padding: 5px 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      color: rgba(190,240,140,0.85);
      letter-spacing: 2px;
      position: relative; z-index: 2;
      animation: fadeSlideUp 1s 0.65s both;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== COUPON ===== */
    .coupon-container { padding: 0 16px 40px; }

    .coupon-card {
      background: white;
      border-radius: 20px;
      margin-top: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      animation: fadeSlideUp 0.9s 0.7s both;
    }

    .coupon-top {
      background: linear-gradient(135deg, #2d6a2d 0%, #4aaa4a 100%);
      padding: 22px 20px 18px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .coupon-top::before {
      content: '';
      position: absolute;
      top: -50%; left: -70%;
      width: 50%; height: 200%;
      background: rgba(255,255,255,0.12);
      transform: skewX(-18deg);
      animation: coupon-shine 4s 2s infinite;
    }
    @keyframes coupon-shine {
      0%       { left: -70%; }
      40%, 100% { left: 130%; }
    }

    .staff-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #FFD700;
      color: #1a3a1a;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2.5px;
      padding: 6px 20px;
      border-radius: 4px;
      margin-bottom: 14px;
      animation: badge-pulse 2.5s 2s ease-in-out infinite;
    }
    .star { font-size: 12px; }
    @keyframes badge-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,215,0,0.5); }
      50%      { box-shadow: 0 0 0 10px rgba(255,215,0,0); }
    }

    .coupon-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      color: rgba(255,255,255,0.88);
      margin-bottom: 8px;
    }

    .discount-wrap {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 2px;
      position: relative;
    }
    .pulse-ring {
      position: absolute;
      width: 130px; height: 130px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation: pulse-ring 2.5s 2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: translate(-50%,-50%) scale(0.8); opacity: 0.8; }
      100% { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
    }
    .discount-num {
      font-family: 'Noto Serif JP', serif;
      font-size: 72px;
      color: white;
      line-height: 1;
      font-weight: 600;
      animation: popIn 0.7s 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .discount-pct {
      font-family: 'Noto Serif JP', serif;
      font-size: 28px;
      color: rgba(255,255,255,0.9);
      animation: popIn 0.7s 1.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .coupon-divider {
      display: flex;
      align-items: center;
      margin: 0 -1px;
    }
    .divider-line { flex: 1; border-top: 1px dashed #b0d8a8; }
    .divider-circle-left  { width:20px; height:20px; background:#f4f7f2; border-radius:50%; flex-shrink:0; margin-left:-10px;  }
    .divider-circle-right { width:20px; height:20px; background:#f4f7f2; border-radius:50%; flex-shrink:0; margin-right:-10px; }

    .coupon-bottom { padding: 18px 20px 20px; }

    .coupon-condition {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: #2d5a2d;
      font-weight: 500;
      text-align: center;
      background: #edf6e8;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
      line-height: 1.9;
      animation: pulse-bg 2.5s 2s ease-in-out infinite;
    }
    @keyframes pulse-bg {
      0%,100% { background: #edf6e8; }
      50%      { background: #d8f0d0; }
    }

    .coupon-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eef5ec;
    }
    .coupon-detail-row:last-child { border-bottom: none; }
    .detail-label { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: #999; }
    .detail-value { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: #333; font-weight: 500; }

    /* ===== BUTTON ===== */
    .use-button {
      background: linear-gradient(135deg, #1a3a1a, #3a7a3a);
      color: #d8f0c0;
      border: none;
      border-radius: 14px;
      width: 100%;
      padding: 18px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 500;
      margin-top: 16px;
      cursor: pointer;
      letter-spacing: 2px;
      animation: fadeSlideUp 0.9s 1.1s both;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .use-button:active { transform: scale(0.97); }
    .use-button::after {
      content: '';
      position: absolute;
      top: -50%; left: -70%;
      width: 40%; height: 200%;
      background: rgba(255,255,255,0.15);
      transform: skewX(-20deg);
      animation: shimmer 3.5s 3s infinite;
    }
    @keyframes shimmer {
      0%       { left: -70%; }
      35%, 100% { left: 130%; }
    }
  </style>
</head>
<body>
  <div class="screen">

    <div class="line-header">
      <span class="back-arrow">‹</span>
      <span class="line-header-title">nana's green tea クーポン</span>
    </div>

    <div class="cafe-banner" id="banner">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="floating-matcha">🍵</div>
      <div class="cafe-name-main">nana's green tea</div>
      <div class="cafe-branch">四条室町店</div>
      <div class="cafe-tagline">京都経済センター勤務者 限定クーポン</div>
    </div>

    <div class="coupon-container">
      <div class="coupon-card">
        <div class="coupon-top">
          <div class="staff-badge">
            <span class="star">★</span>STAFF SPECIAL<span class="star">★</span>
          </div>
          <div class="coupon-title">京都経済センター勤務者様限定</div>
          <div class="discount-wrap">
            <div class="pulse-ring"></div>
            <div class="discount-num" id="count-num">0</div>
            <div class="discount-pct">%OFF</div>
          </div>
        </div>

        <div class="coupon-divider">
          <div class="divider-circle-left"></div>
          <div class="divider-line"></div>
          <div class="divider-circle-right"></div>
        </div>

        <div class="coupon-bottom">
          <div class="coupon-condition">
            📱 会計時にこの画面を<br>スタッフへご提示ください
          </div>
          <div class="coupon-detail-row">
            <span class="detail-label">対象</span>
            <span class="detail-value">京都経済センター勤務者様</span>
          </div>
          <div class="coupon-detail-row">
            <span class="detail-label">対象メニュー</span>
            <span class="detail-value">全メニュー</span>
          </div>
          <div class="coupon-detail-row">
            <span class="detail-label">有効期限</span>
            <span class="detail-value" id="expiry-date"></span>
          </div>
          <div class="coupon-detail-row">
            <span class="detail-label">ご利用回数</span>
            <span class="detail-value">1日1回まで</span>
          </div>
        </div>
      </div>

      <button class="use-button" id="use-btn" onclick="handleUse()">このクーポンを使う</button>
    </div>

  </div>

  <script>
    // 有効期限（月末自動計算）
    const today = new Date();
    const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
    document.getElementById('expiry-date').textContent =
      lastDay.getFullYear() + '年' + (lastDay.getMonth() + 1) + '月' + lastDay.getDate() + '日';

    // 数字カウントアップ 0→10
    setTimeout(function() {
      var n = 0;
      var el = document.getElementById('count-num');
      var timer = setInterval(function() {
        n++;
        el.textContent = n;
        if (n >= 10) clearInterval(timer);
      }, 80);
    }, 1200);

    // 浮遊パーティクル
    var banner = document.getElementById('banner');
    function spawnParticle() {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.bottom = '0px';
      p.style.animationDuration = (2.5 + Math.random() * 2) + 's';
      p.style.animationDelay = (Math.random() * 0.5) + 's';
      var size = (2 + Math.random() * 3) + 'px';
      p.style.width = size;
      p.style.height = size;
      p.style.opacity = 0.4 + Math.random() * 0.4;
      banner.appendChild(p);
      setTimeout(function() { p.remove(); }, 5000);
    }
    setInterval(spawnParticle, 600);

    // クーポン使用ボタン
    function handleUse() {
      var btn = document.getElementById('use-btn');
      btn.style.background = 'linear-gradient(135deg, #1a5a1a, #3aaa3a)';
      btn.textContent = '✓ ご提示ありがとうございます！';
      btn.style.color = 'white';
      setTimeout(function() {
        btn.style.background = 'linear-gradient(135deg, #1a3a1a, #3a7a3a)';
        btn.textContent = 'このクーポンを使う';
        btn.style.color = '#d8f0c0';
      }, 3000);
    }
  </script>
</body>
</html>
